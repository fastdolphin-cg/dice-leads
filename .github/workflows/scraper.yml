name: Daily LATAM Lead Scraper

on:
  schedule:
    - cron: '0 12 * * *'    # 8:00 AM EDT (UTC-4)
    - cron: '30 19 * * *'   # 3:30 PM EDT (UTC-4)
  workflow_dispatch:
    inputs:
      keywords:
        description: 'Comma-separated keywords (leave empty for defaults)'
        required: false
        default: ''
      employment_types:
        description: 'Comma-separated employment types (leave empty for defaults)'
        required: false
        default: ''
      date_range:
        description: 'Number of days to look back (1-30)'
        required: false
        default: '2'
      ai_model:
        description: 'AI model to use (haiku or sonnet)'
        required: false
        default: 'haiku'
      send_email:
        description: 'Send email notification (true or false)'
        required: false
        default: 'true'
      run_label:
        description: 'Label for this run (e.g. "Modified Run")'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCRAPER_KEYWORDS: ${{ github.event.inputs.keywords }}
          SCRAPER_EMPLOYMENT_TYPES: ${{ github.event.inputs.employment_types }}
          SCRAPER_DATE_RANGE: ${{ github.event.inputs.date_range }}
          SCRAPER_AI_MODEL: ${{ github.event.inputs.ai_model }}
          SCRAPER_SEND_EMAIL: ${{ github.event.inputs.send_email }}
          SCRAPER_RUN_LABEL: ${{ github.event.inputs.run_label }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scraper/dice_scraper.py
